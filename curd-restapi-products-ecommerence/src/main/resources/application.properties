spring.application.name=curd-restapi-products-ecommerence




# JDBC URL for MySQL database
# - localhost  MySQL is running on the same machine
# - 3306  default MySQL port
# - ecommerce_db  database name
# - useSSL=false  disables SSL (for local dev)
# - serverTimezone=UTC sets timezone to UTC to avoid warnings
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# MySQL username
spring.datasource.username=root

# MySQL password (replace 'yourpassword' with your actual MySQL password)
spring.datasource.password=MyPassword

# JDBC driver class for MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate auto DDL (Data Definition Language) option
# - 'update'  automatically creates or updates tables to match Entities
# - options: create, create-drop, update, validate, none
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in console for debugging
spring.jpa.show-sql=true

# Hibernate dialect tells Hibernate how to generate SQL for MySQL 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect